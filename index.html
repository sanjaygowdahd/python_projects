<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Assistant</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Base Reset & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            /* Vibrant background with a fixed fitness image and energetic gradient overlay */
            background: linear-gradient(135deg, rgba(233, 64, 87, 0.85) 0%, rgba(138, 35, 135, 0.9) 100%), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
            color: #fff; 
            min-height: 100vh; 
            padding: 40px 20px; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Main Container - Glassmorphism Effect */
        .container { 
            width: 100%; 
            max-width: 1000px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
        }

        /* Header Section */
        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
        }

        /* Added AI Avatar Picture */
        .header-image {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #F27121;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(242, 113, 33, 0.4);
        }

        h1 { 
            text-align: center; 
            font-weight: 800; 
            font-size: 3.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Vibrant text gradient */
            background: linear-gradient(to right, #F27121, #E94057, #ffb88c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        p.subtitle {
            text-align: center;
            color: #f1f5f9;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Form & Inputs */
        form { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 40px; 
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        input[type="text"] { 
            flex: 1; 
            padding: 16px 20px; 
            border: none; 
            background: transparent;
            font-size: 1.1rem; 
            font-family: 'Poppins', sans-serif;
            color: #1e293b;
            outline: none;
        }
        input[type="text"]::placeholder {
            color: #94a3b8;
        }
        button { 
            padding: 16px 36px; 
            background: linear-gradient(135deg, #F27121 0%, #E94057 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(233, 64, 87, 0.4);
        }
        button:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 20px rgba(233, 64, 87, 0.6);
        }
        button:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Rendered Markdown Response Area */
        #formatted-response {
            animation: fadeIn 0.6s ease-out;
            color: #1e293b;
        }
        
        /* Wrapper styling applied only when there is an actual response */
        #formatted-response:not(:empty) {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25); 
        }
        
        /* Typography inside the response */
        #formatted-response h1, #formatted-response h2, #formatted-response h3 {
            color: #E94057;
            margin-top: 25px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #ffe4e6;
            padding-bottom: 8px;
        }

        #formatted-response p {
            margin-bottom: 15px;
            line-height: 1.7;
        }

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin-top: 20px; 
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        th, td { 
            padding: 18px; 
            text-align: left; 
            border-bottom: 1px solid #e2e8f0; 
            line-height: 1.6;
        }
        th { 
            background: linear-gradient(135deg, #F27121 0%, #E94057 100%);
            color: #ffffff; 
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { 
            background-color: #fff1eb; 
            transition: background-color 0.2s;
        }
        
        td ul { padding-left: 20px; margin-top: 8px; }
        td li { margin-bottom: 4px; color: #475569; }
        td strong { color: #0f172a; }

        /* Dynamic Image Styling (if AI generates images in markdown) */
        img.content-img { 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            max-width: 100%; 
            height: auto; 
            object-fit: cover;
            display: block;
            margin: 25px auto;
            border: 4px solid #fff;
        }

        /* Error messages */
        p:contains("❌") {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            form { flex-direction: column; background: transparent; padding: 0; box-shadow: none; }
            input[type="text"] { background: rgba(255,255,255,0.95); border-radius: 12px; margin-bottom: 10px; }
            button { width: 100%; }
            th, td { padding: 12px; font-size: 0.9rem; }
            .container { padding: 30px 20px; }
            #formatted-response:not(:empty) { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-content">
        <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?q=80&w=500&auto=format&fit=crop" alt="FitGenius AI Avatar" class="header-image">
        <h1>FitGenius AI</h1>
        <p class="subtitle">Your Elite Personal Trainer & Nutritionist</p>
    </div>
    
    <form method="POST" id="ai-form" onsubmit="showLoading()">
        <input type="text" name="message" placeholder="E.g., 'Build me a 3-day split for muscle gain' or 'Give me a high-protein vegan dinner'" required>
        <button type="submit" id="submit-btn">Generate Plan ✨</button>
    </form>

    <div id="ai-response" style="display:none;">{{ response }}</div>
    
    <div id="formatted-response"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // Visual UX: Change button text while waiting for Flask/API
    function showLoading() {
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = "Thinking... ⏳"; 
        btn.disabled = true;
    }

    // Get the raw text generated by Python
    const rawText = document.getElementById('ai-response').innerText;
    
    // If there is text, parse it into HTML and display it safely
    if(rawText && rawText.trim() !== "") {
        document.getElementById('formatted-response').innerHTML = marked.parse(rawText);
        
        // Add a class to images generated within the markdown for beautiful styling
        const generatedImages = document.querySelectorAll('#formatted-response img');
        generatedImages.forEach(img => img.classList.add('content-img'));
    }
</script>

</body>
</html>
